plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.11'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'org.owasp.dependencycheck' version '9.2.0'
}

group = 'com.myMongoTest'
version = '0.0.1-SNAPSHOT'

java {
	sourceCompatibility = '17'
    targetCompatibility = '17'
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	// 1. Web & Thymeleaf
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
	implementation 'nz.net.ultraq.thymeleaf:thymeleaf-layout-dialect'

	// 2. MongoDB
	implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'

	// 2-1. Cache (Phase 2)
	implementation 'org.springframework.boot:spring-boot-starter-cache'
	implementation 'com.github.ben-manes.caffeine:caffeine'

	// 3. Security (★ Spring Boot 3.x 버전용으로 수정)
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.thymeleaf.extras:thymeleaf-extras-springsecurity6'

	// 4. Utilities
	implementation 'net.coobird:thumbnailator:0.4.1'
	implementation 'commons-io:commons-io:2.16.1' // 버전을 명시해 주어야 안정적입니다.

	// 5. Lombok & DevTools
	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'

	// 6. Test
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-testcontainers'
	testImplementation 'org.springframework.security:spring-security-test'
	testImplementation 'org.testcontainers:junit-jupiter'
	testImplementation 'org.testcontainers:mongodb'
}

tasks.named('test') {
	useJUnitPlatform()
	// BcryptHashPrintTest 등 테스트의 System.out 출력을 콘솔에 표시
	testLogging {
		showStandardStreams = true
	}
}

// 샘플 데이터 100건 삽입: ./gradlew bootRun -PsampleData=true
bootRun {
	// 프로덕션 JVM 옵션: ./gradlew bootRun -Pprod
	if (project.hasProperty('prod')) {
		// GC 로그: build/gc-*.log (실제 배포 시 -Xlog:gc* 재정의 가능)
		jvmArgs = ['-Xmx512m', '-Xms256m', '-XX:MetaspaceSize=128m',
		           '-Xlog:gc*:file=./build/gc-%t.log:time,uptime:filecount=3,filesize=5m']
		args = ['--spring.profiles.active=prod']
	} else if (project.hasProperty('sampleData')) {
		args = ['--spring.profiles.active=sample-data']
	}
}