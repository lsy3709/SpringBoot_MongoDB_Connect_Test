# 기본 설정 — 프로파일 미지정 시 적용 (로컬 개발용)
# 동일 머신에서 Docker MongoDB(-p 27017:27017) 사용 시 localhost:27017
spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/blog3?maxPoolSize=10&minPoolSize=2&maxIdleTimeMS=30000
  servlet:
    multipart:
      # 업로드 파일 크기 제한 (DoS·스토리지 남용 방지)
      max-file-size: 10MB
      max-request-size: 10MB

# 로컬 HTTP용 — secure: false 필수
server:
  tomcat:
    threads:
      max: 50  # 1GB 환경 권장, 기본 200 대비 제한
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax

# admin 비밀번호를 admin1234로 리셋
app:
  default-admin:
    force-reset-password: true
  login:
    rate-limit:
      max-per-minute: 20
  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 50
  memo:
    findAll-max-size: 500

# Actuator: health(헬스체크), metrics(연결 풀 등 모니터링)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# 로그인 디버깅 시 로그 확인 (원인 파악 후 레벨 낮춰도 됨)
logging:
  level:
    com.myMongoTest: INFO
    org.springframework.security.web.authentication: DEBUG
