# 기본 설정 — 프로파일 미지정 시 적용 (로컬 개발용)
spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/blog3
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 로컬 HTTP용 — secure: false 필수
server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: lax

# admin 비밀번호를 admin1234로 리셋
app:
  default-admin:
    force-reset-password: true
