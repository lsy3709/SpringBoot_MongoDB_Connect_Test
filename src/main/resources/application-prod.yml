# [필수] 프로파일 prod 로 실행: --spring.profiles.active=prod 또는 SPRING_PROFILES_ACTIVE=prod
# [동일 머신] 스프링부트(호스트) + Docker MongoDB(-p 27017:27017) 이면 localhost:27017 사용
# [스프링부트도 Docker] 앱·MongoDB 둘 다 컨테이너면 MongoDB 서비스명 사용 (예: mongodb://mongodb-container:27017/blog3)
spring:
  application:
    name: SpringBoot_MongoDB_Connect_Test
  data:
    mongodb:
      # 1GB 환경: maxPoolSize 10~20 권장 (기본 100은 과다)
      uri: mongodb://localhost:27017/blog3?maxPoolSize=20&minPoolSize=5&maxIdleTimeMS=60000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: none
  tomcat:
    threads:
      # 1GB 메모리·Xmx512m 환경에서 50 유지 (과다 스레드 시 메모리 압박 방지)
      max: 50

logging:
  level:
    root: INFO
    com.myMongoTest: INFO
    org.springframework.security: INFO
  file:
    name: /home/ec2-user/logs/spring-mongodb.log

app:
  default-admin:
    force-reset-password: false
  login:
    rate-limit:
      max-per-minute: 10
  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 50
  memo:
    findAll-max-size: 500
