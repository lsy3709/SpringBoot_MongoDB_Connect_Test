# [AWS 필수] 1) 반드시 프로파일 prod 로 실행: --spring.profiles.active=prod 또는 SPRING_PROFILES_ACTIVE=prod
# [AWS Docker] 2) MongoDB가 별도 컨테이너면 localhost 불가 → 아래 uri를 실제 호스트로 (예: mongodb://mongo:27017/blog3)
spring:
  application:
    name: SpringBoot_MongoDB_Connect_Test
  data:
    mongodb:
      # [주의] 실제 운영 시에는 반드시 몽고DB에 계정을 만들고 아래처럼 적용하세요.
      # uri: mongodb://<username>:<password>@localhost:27017/blog3?authSource=admin
      uri: mongodb://localhost:27017/blog3 # Docker에서 MongoDB 컨테이너면 호스트명(예: mongo)으로 변경
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# [HTTP 환경] HTTPS 없이 운영 시 아래 설정 사용 (secure: false 필수)
# [HTTPS 환경] HTTPS 프록시(ALB 등) 뒤에서 운영 시 secure: true, same-site: none 으로 변경
server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: lax

# 패키지별 로깅 레벨 설정
logging:
  level:
    root: INFO
    com.myMongoTest: INFO
    org.springframework.security: INFO

# admin 비밀번호를 admin1234로 강제 리셋 (로그인 확인 후 false로 변경 권장)
app:
  default-admin:
    force-reset-password: true
