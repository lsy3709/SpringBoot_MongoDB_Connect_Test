<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{layout/default_layout2}">

<body><th:block layout:fragment="content">
   <h1>스마트 인벤토리 (Smart Inventory)</h1>

   <!-- 카테고리 탭 바 -->
   <div class="mb-3" id="categoryTabsWrap">
      <ul class="nav nav-tabs" id="categoryTabs"></ul>
      <button type="button" class="btn btn-sm btn-outline-secondary mt-1" id="btnAddTab">탭 추가</button>
   </div>
   <div class="modal fade" id="modalAddTab" tabindex="-1">
      <div class="modal-dialog">
         <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">탭 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
               <input type="text" class="form-control" id="newTabName" placeholder="탭 이름 (예: 팬트리, 안방)" />
            </div>
            <div class="modal-footer">
               <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
               <button type="button" class="btn btn-primary" id="btnConfirmAddTab">추가</button>
            </div>
         </div>
      </div>
   </div>
   <style>
   body {
   background-image:url('/image/balloon.jpg')
   }
   </style>

    <div class="form-group">
        <!--     <h1>Image Upload</h1> -->
        <form id="my-form">
        <div id=inputForm>
            <label for="comment">메모 추가: 대표사진 한장 추가가능해요.</label>
            <!-- <input  class="form-control"   id="dbId" name="dbId" placeholder="1 형식 입력"></input> -->
            <input class="form-control"   id="dbTitle" name="dbTitle"placeholder="ex)제목_반찬,음료,과일,재료,소스,냉동,간식등"></input>

            <input class="form-control"   id="dbMessage" name="dbMessage" placeholder="유통기한등 메모"></input>

            </div>
            <br>
            <div class="form-group">
                <label for="dbTags">태그 (쉼표로 구분):</label>
                <input type="text" class="form-control" id="dbTags" name="dbTags" placeholder="예: 과일, 냉동, 반찬">
            </div>
            <br>
            <div class="form-group">
                <label for="file">Choose an image:</label>
                <input type="file" id="image" name="file" class="form-control-file" onchange="loadImage()">
            </div>
            <br>
            <br>
                        <button id="uploadDBWithImageBtn" type="submit" class="btn btn-primary" >추가하기</button>

  <option value="_id">ID 검색</option>
