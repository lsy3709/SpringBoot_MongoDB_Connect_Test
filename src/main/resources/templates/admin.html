<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/default_layout2}">

<body><th:block layout:fragment="content">
   <style>body{background-image:url('/image/balloon.jpg');background-size:cover;background-repeat:no-repeat;min-height:100vh}</style>
   <div class="mb-3">
     <a th:href="@{/admin}">대시보드</a> |
     <a th:href="@{/admin/inventory}">인벤토리</a>
     <span sec:authorize="hasRole('ADMIN')"> | <a th:href="@{/admin/members}">회원 관리</a></span>
   </div>
   <h1>스마트 인벤토리 (Smart Inventory)</h1>

   <script th:inline="javascript">
     /* 관리자 여부를 전역 변수에 저장 (자바스크립트 boolean) */
     window.isAdmin = /*[[${#authorization.expression('hasRole(''ADMIN'')')}]]*/ false;
   </script>

   <div class="mb-3">
     <a th:href="@{/admin/export/memos.xlsx}" class="btn btn-outline-success btn-sm" id="btnExportExcel">엑셀 내보내기</a>
     <form th:action="@{/admin/import/memos}" method="post" enctype="multipart/form-data" class="d-inline-block ms-2" id="formImportExcel">
       <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
       <input type="file" name="file" accept=".xlsx" class="form-control form-control-sm d-inline-block w-auto">
       <button type="submit" class="btn btn-outline-primary btn-sm">엑셀 가져오기</button>
     </form>
     <span th:if="${importSuccessMsg}" class="text-success ms-2" th:text="${importSuccessMsg}"></span>
     <span th:if="${importErrorMsg}" class="text-danger ms-2" th:text="${importErrorMsg}"></span>
     <span th:if="${importWarnMsg}" class="text-warning ms-2" th:text="${importWarnMsg}"></span>
   </div>

   <!-- 카테고리 탭 바 -->
   <div class="mb-3" id="categoryTabsWrap">
      <ul class="nav nav-tabs" id="categoryTabs"></ul>
      <button type="button" class="btn btn-sm btn-outline-secondary mt-1" id="btnAddTab">탭 추가</button>
   </div>
   <div class="modal fade" id="modalAddTab" tabindex="-1">
      <div class="modal-dialog">
         <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">탭 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
               <input type="text" class="form-control" id="newTabName" placeholder="탭 이름 (예: 팬트리, 안방)" />
            </div>
            <div class="modal-footer">
               <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
               <button type="button" class="btn btn-primary" id="btnConfirmAddTab">추가</button>
            </div>
         </div>
      </div>
   </div>
   <!-- 이미지자동변경 -->

   <!-- <h2>Springboot 2.7.8, AWS Lightsail AMI2, docker mongodb 6.0.4, SSL 설정, 도메인설정.</h2>
   <h2>Spring Security 적용, thymeleaf 적용.</h2> -->

  <!-- 	<div class="form-group" >

    		<button id="dbInsertBtn" class="btn btn-primary">디비추가</button>
    	</div>-->
   <script th:inline="javascript">
     // 엑셀 내보내기 버튼 클릭 시 confirm 후 진행
     document.addEventListener('DOMContentLoaded', function() {
       var exportBtn = document.getElementById('btnExportExcel');
       if (exportBtn) {
         exportBtn.addEventListener('click', function(e) {
           if (!confirm('현재 메모와 탭 정보를 엑셀로 내보낼까요?')) {
             e.preventDefault();
           }
         });
       }
       var importForm = document.getElementById('formImportExcel');
       if (importForm) {
         importForm.addEventListener('submit', function(e) {
           if (!confirm('엑셀 파일을 가져와서 메모/탭을 추가하시겠습니까?')) {
             e.preventDefault();
           }
         });
       }
     });
   </script>

   <br>
    <div class="form-group">
        <!--     <h1>Image Upload</h1> -->
        <form id="my-form">
        <div id=inputForm>
            <label for="comment">메모 추가: 대표사진 한장 추가가능해요.</label>
            <!-- <input  class="form-control"   id="dbId" name="dbId" placeholder="1 형식 입력"></input> -->
            <input class="form-control"   id="dbTitle" name="dbTitle"placeholder="ex)제목_반찬,음료,과일,재료,소스,냉동,간식등"></input>
            <br>
            <input class="form-control"   id="dbMessage" name="dbMessage" placeholder="유통기한등 메모"></input>
            <br>
            <div class="form-group">
                <label for="dbExpiryDate">유통기한:</label>
                <input type="date" class="form-control" id="dbExpiryDate" name="dbExpiryDate">
            </div>
            <br>
            <div class="form-group">
                <label for="dbTags">태그 (쉼표로 구분):</label>
                <input type="text" class="form-control" id="dbTags" name="dbTags" placeholder="예: 과일, 냉동, 반찬">
            </div>
            <br>
            <div class="form-group">
                <label for="file">Choose an image:</label>
                <input type="file" id="image" name="file" class="form-control-file" onchange="loadImage()">
            </div>
            <br>
            <br>
                        <button id="uploadDBWithImageBtn" type="submit" class="btn btn-primary" >추가하기</button>
              <div>
        <img id="preview" src="" alt="Image Preview">
        <video id="previewVideo" controls src=""></video>
    </div>
    <br>
    </div>
    
        </form>
    </div>
  <!--   <div>
        <img id="preview" src="" alt="Image Preview">
        <video id="previewVideo" controls src=""></video>
    </div>
    <br> -->

    <div id="ImageTest" ></div>
<br>
         	<div class="form-group" id=searchBox>
    		<label for="comment">검색: </label>
    		<select name="searchDB" id="searchDB">
  <option value="message">메세지 검색</option>
  <option value="title" selected>제목 검색</option>
  <option value="tag">태그 검색</option>
  <option value="_id">ID 검색</option>
</select>
    		<input class="form-control" id="searchContent" name="searchContent" placeholder="제목·태그 등으로 검색"></input>
    		<br>
    		<button id="dbSearchBtn" class="btn btn-primary">검색하기</button>
    		<br>
    		<div id="tagQuickButtons" class="mt-2"></div>
    	</div>

    <br>
    <!-- 검색 모드: 검색 시에만 표시 -->
    <div id="searchResultSection" style="display:none;">
      <h2>검색 목록</h2>
      <h3 id="findSearchMemoCount2">검색 count : <span id="findSearchMemoCount"></span></h3>
      <div id="searchResult"></div>
    </div>

    <br>
    <button id="scroll-to-top" class="btn btn-primary">Top</button>

   <!-- 전체 목록 모드: 검색이 아닐 때 표시 -->
   <div id="fullListSection">
      <h2>전체 목록</h2>
      <h3>전체 count : <span id="findAllMemoCount"></span></h3>
      <div class="mb-2" sec:authorize="hasRole('ADMIN')">
        <label class="form-check-label me-2">
          <input type="checkbox" class="form-check-input" id="chkAllMemos">
          전체 선택
        </label>
        <button type="button" id="btnDeleteSelected" class="btn btn-danger btn-sm">선택 삭제</button>
      </div>
      <div id="dbResult"></div>
    </div>

      <!-- 메모 상세보기 모달 -->
      <div class="modal fade" id="memoDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="memoDetailTitle">메모 상세보기</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="memoDetailImage" class="mb-3 text-center"></div>
              <dl class="row">
                <dt class="col-sm-3">제목</dt>
                <dd class="col-sm-9" id="memoDetailTitleText"></dd>
                <dt class="col-sm-3">메세지</dt>
                <dd class="col-sm-9" id="memoDetailMessage"></dd>
                <dt class="col-sm-3">태그</dt>
                <dd class="col-sm-9" id="memoDetailTags"></dd>
                <dt class="col-sm-3">유통기한</dt>
                <dd class="col-sm-9" id="memoDetailExpiry"></dd>
                <dt class="col-sm-3">등록일</dt>
                <dd class="col-sm-9" id="memoDetailDate"></dd>
              </dl>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
              <button type="button" class="btn btn-primary" id="memoDetailBtnEdit">수정</button>
              <button type="button" class="btn btn-danger" id="memoDetailBtnDelete">삭제</button>
            </div>
          </div>
        </div>
      </div>

     </th:block>
</body>
