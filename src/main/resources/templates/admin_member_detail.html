<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default_layout2}">

<body>
<th:block layout:fragment="content">
  <style>body{background-image:url('/image/balloon.jpg');background-size:cover;background-repeat:no-repeat;min-height:100vh}</style>
  <div class="mb-3">
    <a th:href="@{/admin}">대시보드</a> |
    <a th:href="@{/admin/inventory}">인벤토리</a> |
    <a th:href="@{/admin/members}">회원 관리</a>
  </div>
  <h1>회원 상세</h1>

  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

  <dl class="row mt-3">
    <dt class="col-sm-2">이메일</dt>
    <dd class="col-sm-10" th:text="${user.email}"></dd>
    <dt class="col-sm-2">권한</dt>
    <dd class="col-sm-10" th:text="${user.role}"></dd>
  </dl>

  <hr>
  <h5>권한 변경</h5>
  <form th:action="@{/admin/members/{id}/role(id=${user.id})}" method="post" class="mb-3">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <select name="role" class="form-select d-inline-block w-auto">
      <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
      <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
    </select>
    <button type="submit" class="btn btn-primary">권한 변경</button>
  </form>

  <hr>
  <h5>탈퇴 처리</h5>
  <form th:action="@{/admin/members/{id}/withdraw(id=${user.id})}" method="post"
        onsubmit="return confirm('정말 탈퇴 처리하시겠습니까?');">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit" class="btn btn-danger">탈퇴 처리</button>
  </form>
</th:block>
</body>
</html>
