<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
      
  <th:block th:fragment="headerFragment">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
  <a class="navbar-brand" href="/">Home</a>

  <div class="collapse navbar-collapse" id="navbarNav">
    <!-- 오른쪽 끝: 로그인 유저, Admin, 로그아웃 나란히 (높이 맞춤) -->
    <ul class="navbar-nav ms-auto align-items-center">
      <li class="nav-item" sec:authorize="isAuthenticated()">
        <span class="nav-link py-2 text-white-50" sec:authentication="name">유저</span>
      </li>
      <li class="nav-item" sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_ADUSER')">
        <a class="nav-link py-2" href="/admin">Admin</a>
      </li>
      <li class="nav-item d-flex align-items-center" sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" class="d-flex align-items-center">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="nav-link btn btn-link border-0 p-0 py-2 text-start" style="color: rgba(255,255,255,.55); line-height: 1.5;">로그아웃</button>
        </form>
      </li>
    </ul>
    <!-- 오른쪽 끝: 회원가입, 로그인 (비로그인 시) -->
    <ul class="navbar-nav ms-auto align-items-center" sec:authorize="isAnonymous()">
      <li class="nav-item">
        <a class="nav-link py-2" href="/joinForm">회원가입</a>
      </li>
      <li class="nav-item">
        <a class="nav-link py-2" href="/login">로그인</a>
      </li>
    </ul>
  </div>
</nav>
  </th:block>
</html>
