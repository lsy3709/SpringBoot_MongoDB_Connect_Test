<!DOCTYPE html>
   <html xmlns:th="http://www.thymeleaf.org"
xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
layout:decorate="~{layout/default_layout2}">

   
<body><th:block layout:fragment="content">
   <style>
   body { background-image:url('/image/balloon.jpg'); background-size:cover; background-repeat:no-repeat; min-height:100vh }
   .password-match { border: 2px solid #198754 !important; }
   .password-mismatch { border: 2px solid #dc3545 !important; }
   </style>
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-6 col-sm-8">
							  <form action="/joinUser" role="form" method="post" th:object="${user}" id="joinForm">
					<div class="form-group">
						<label for="email">이메일:</label>
						<input type="text" class="form-control" name="email" id="email" placeholder="email@example.com" th:value="${preservedEmail}">
					</div>
					<div class="form-group mt-2">
						<label for="password">비밀번호:</label>
						<input type="password" class="form-control" name="password" id="password" placeholder="8자 이상, 영문+숫자 각 1자 이상">
						<small class="form-text text-muted">영문자와 숫자를 각각 1자 이상 포함해야 합니다.</small>
					</div>
					<div class="form-group mt-2">
						<label for="password2">비밀번호 확인:</label>
						<input type="password" class="form-control" id="password2" placeholder="비밀번호 재입력">
						<small class="form-text" id="passwordConfirmHint"></small>
					</div>
				<input type="hidden" name="role" id="role" value="USER">
					<p th:if="${joinErrorMsg}" class="text-danger mt-2" th:text="${joinErrorMsg}"></p>
					<button type="submit" class="btn btn-primary mt-2" id="joinBtn">회원가입</button>
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				</form>
				
			</div>
		</div>
	</div>
	<script>
	(function() {
		var pw = document.getElementById('password');
		var pw2 = document.getElementById('password2');
		var hint = document.getElementById('passwordConfirmHint');

		function checkMatch() {
			var v1 = pw ? pw.value : '';
			var v2 = pw2 ? pw2.value : '';
			pw2.classList.remove('password-match', 'password-mismatch');
			hint.textContent = '';
			if (v2.length === 0) return;
			if (v1 === v2) {
				pw2.classList.add('password-match');
				hint.textContent = '비밀번호가 일치합니다.';
				hint.className = 'form-text text-success';
			} else {
				pw2.classList.add('password-mismatch');
				hint.textContent = '비밀번호가 일치하지 않습니다.';
				hint.className = 'form-text text-danger';
			}
		}

		if (pw) pw.addEventListener('input', checkMatch);
		if (pw) pw.addEventListener('keyup', checkMatch);
		if (pw2) pw2.addEventListener('input', checkMatch);
		if (pw2) pw2.addEventListener('keyup', checkMatch);
	})();
	</script>
     </th:block>
</body>
